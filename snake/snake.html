<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport", content="width=device-width, initial-scale=1.0">
        <title>Snake</title>
        <link rel="stylesheet" href="snake.css">
        <script src="snake.js"></script>
    </head>

    <body>
        <h1>Snake</h1>
        <canvas id="board"></canvas>

        <!-- Game over modal -->
        <div id="game-over-modal" class="modal hidden">
            <div class="modal-content">
                <h2>End of the Game</h2>
                <p id="final-score">Score: 0</p>
                <div class="modal-actions">
                    <button id="snake-new">New Game</button>
                    <button id="view-scores">All Scores</button>
                </div>
            </div>
        </div>

        <!-- Scores history modal -->
        <div id="scores-modal" class="modal hidden">
            <div class="modal-content">
                <h2>All Scores</h2>
                <ul id="scores-list"></ul>
                <div class="modal-actions">
                    <button id="close-scores">Close</button>
                    <button id="clear-scores">Clear All</button>
                </div>
            </div>
        </div>
    </body>
</html>
