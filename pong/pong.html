<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport", content="width=device-width, initial-scale=1.0">
        <title>Pong</title>
        <link rel="stylesheet" href="pong.css">
        <script src="pong.js"></script>
    </head>

    <body>
        <canvas id="board"></canvas>
        <div id="winner-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="winner-text"></h2>
                <div class="modal-actions">
                    <button id="modal-new-btn">New Game</button>
                    <button id="view-scores">View All Scores</button>
                </div>
            </div>
        </div>

        <!-- Scores history modal -->
        <div id="scores-modal" class="modal hidden">
            <div class="modal-content">
                <h2>All Scores</h2>
                <ul id="scores-list"></ul>
                <div class="modal-actions">
                    <button id="close-scores">Close</button>
                    <button id="clear-scores">Clear All</button>
                </div>
            </div>
        </div>
    </body>
</html>
