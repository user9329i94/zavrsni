<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport", content="width=device-width, initial-scale=1.0">
        <title>Chrome Dinosaur Game</title>
        <link rel="stylesheet" href="dinosaur.css">
        <script src="dinosaur.js"></script>
    </head>
    <body>
        <h1>Chrome Dinosaur Game</h1>
        <canvas id="board"></canvas>

        <!-- Overlay images: show game-over image and reset image on loss -->
        <div id="dino-overlay">
            <img id="game-over-img" class="hidden" src="./img/game-over.png" alt="Game Over" />
            <img id="reset-img" class="hidden" src="./img/reset.png" alt="New Game" />
        </div>
    </body>
</html>
